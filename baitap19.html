<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 19 - Tổng hợp</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .exercise-box { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        input { padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2980b9; }
        .result { margin-top: 10px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bài tập 19: Thực hành JavaScript cơ bản</h1>
    <p><a href="index.html">← Quay lại Trang chủ</a></p>

    <div class="exercise-box">
        <h2>Bài 1: Tính tổng hai số từ Input</h2>
        <input type="number" id="num1" placeholder="Số thứ nhất">
        <input type="number" id="num2" placeholder="Số thứ hai">
        <button onclick="tinhTong()">Tính Tổng</button>
        <div id="res1" class="result"></div>
    </div>

    <div class="exercise-box">
        <h2>Bài 2: Lấy giá trị thông tin người dùng (DOM)</h2>
        <input type="text" id="hoTen" placeholder="Nhập Họ Tên">
        <input type="number" id="tuoi" placeholder="Nhập Tuổi">
        <input type="text" id="sdt" placeholder="Nhập Số điện thoại">
        <button onclick="hienThiThongTin()">Hiển thị</button>
        <div id="res2" class="result"></div>
    </div>

    <div class="exercise-box">
        <h2>Bài 3: Kiểm tra độ dài chuỗi nhập vào</h2>
        <input type="text" id="txtInput" placeholder="Nhập nội dung bất kỳ" style="width: 70%;">
        <button onclick="kiemTraDoDai()">Kiểm tra</button>
        <div id="res3" class="result"></div>
    </div>
</div>

<script>
    // Logic Bài 1
    function tinhTong() {
        let n1 = parseFloat(document.getElementById('num1').value) || 0;
        let n2 = parseFloat(document.getElementById('num2').value) || 0;
        document.getElementById('res1').innerText = "Kết quả: " + (n1 + n2);
    }

    // Logic Bài 2
    function hienThiThongTin() {
        let ten = document.getElementById('hoTen').value;
        let tuoi = document.getElementById('tuoi').value;
        let sdt = document.getElementById('sdt').value;
        if(ten && tuoi && sdt) {
            document.getElementById('res2').innerText = `Chào ${ten}, bạn ${tuoi} tuổi. SĐT của bạn là: ${sdt}`;
        } else {
            document.getElementById('res2').innerText = "Vui lòng nhập đầy đủ thông tin!";
        }
    }

    // Logic Bài 3
    function kiemTraDoDai() {
        let text = document.getElementById('txtInput').value;
        document.getElementById('res3').innerText = "Độ dài chuỗi là: " + text.length + " ký tự.";
    }
</script>

</body>
</html>
